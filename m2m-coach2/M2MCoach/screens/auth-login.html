<!doctype html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M2M Coach — Logga in</title>
<link rel="stylesheet" href="../styles/coach.css">
<style>
html, body {
  overflow: auto;
  display: flex; align-items: center; justify-content: center;
  min-height: 100dvh;
  background: var(--bg);
}

.auth-page {
  min-height: 100dvh; width: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 24px 16px;
  position: relative;
  background:
    radial-gradient(ellipse 60% 50% at 80% 10%, rgba(0,212,170,0.09) 0%, transparent 60%),
    radial-gradient(ellipse 55% 45% at 15% 90%, rgba(247,233,40,0.06) 0%, transparent 60%);
}

.auth-card {
  width: 100%; max-width: 400px;
  background: var(--glass-bg);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-xl);
  box-shadow: var(--glass-shadow);
  padding: 36px 32px;
}

.auth-logo {
  text-align: center; margin-bottom: 28px;
}
.auth-logo-mark {
  font-family: var(--font-display);
  font-size: 44px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--coach);
  text-shadow: var(--glow-coach); line-height: 1;
}
.auth-logo-sub {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.18em; color: var(--muted);
  text-transform: uppercase; margin-top: 5px;
}

.auth-title {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.03em;
  margin-bottom: 6px;
}
.auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-family: var(--font-mono); font-size: 9px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.10em;
  color: var(--muted); margin-bottom: 6px;
}
.form-input {
  width: 100%; height: 44px; padding: 0 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-md);
  color: var(--fg); font-size: 14px;
  outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--coach); background: rgba(0,212,170,0.05); }
.form-input::placeholder { color: var(--muted); }

.form-input-wrap {
  position: relative;
}
.form-input-wrap .form-input { padding-right: 44px; }
.toggle-pw {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); cursor: pointer;
  display: flex; align-items: center;
}
.toggle-pw:hover { color: var(--muted-hi); }
.toggle-pw svg { width: 16px; height: 16px; }

.form-row-between {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.remember-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--muted-hi); cursor: pointer;
}
.remember-check {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.15s;
}
.remember-check.checked {
  background: var(--coach); border-color: var(--coach);
}
.forgot-link {
  font-size: 12px; color: var(--coach);
  text-decoration: none; transition: opacity 0.15s;
}
.forgot-link:hover { opacity: 0.75; }

.auth-btn {
  width: 100%; height: 48px; border-radius: var(--r-lg);
  background: var(--coach); border: none;
  color: #000; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  box-shadow: var(--glow-coach);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.auth-btn:hover { background: oklch(80% 0.14 165); transform: scale(1.02); }
.auth-btn svg { width: 17px; height: 17px; }

.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--muted);
}
.auth-divider::before, .auth-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.auth-divider span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }

.sso-btn {
  width: 100%; height: 44px; border-radius: var(--r-lg);
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  color: var(--muted-hi); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.sso-btn:hover { background: var(--glass-bg-hi); }

.auth-error {
  padding: 10px 14px; border-radius: var(--r-md);
  background: rgba(255,69,69,0.08); border: 1px solid rgba(255,69,69,0.22);
  color: var(--danger); font-size: 12px; margin-bottom: 16px;
  display: none;
}
.auth-error.show { display: block; }

.loading-spinner {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2.5px solid rgba(0,0,0,0.2); border-top-color: #000;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.version-foot {
  text-align: center; margin-top: 24px;
  font-family: var(--font-mono); font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.10em; color: var(--muted);
}

@media (max-width: 420px) {
  .auth-card { padding: 28px 20px; }
}
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">M2M</div>
      <div class="auth-logo-sub">Coach Platform</div>
    </div>

    <div class="auth-title">Välkommen tillbaka</div>
    <div class="auth-sub">Logga in med dina coach-uppgifter</div>

    <div class="auth-error" id="authError">Felaktigt e-post eller lösenord. Försök igen.</div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">E-postadress</label>
        <input id="email" class="form-input" type="email" placeholder="coach@m2m.se" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Lösenord</label>
        <div class="form-input-wrap">
          <input id="password" class="form-input" type="password" placeholder="••••••••" required>
          <button type="button" class="toggle-pw" id="togglePw" onclick="togglePw()">
            <svg id="eyeIcon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M1 8s2.7-5 7-5 7 5 7 5-2.7 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>
          </button>
        </div>
      </div>
      <div class="form-row-between">
        <label class="remember-label" onclick="toggleRemember()">
          <div class="remember-check" id="rememberCheck"></div>
          Kom ihåg mig
        </label>
        <a href="auth-reset.html" class="forgot-link">Glömt lösenord?</a>
      </div>
      <button type="submit" class="auth-btn" id="loginBtn">
        <svg viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h3M11 12l4-4-4-4M15 8H7"/></svg>
        Logga in
      </button>
    </form>

    <div class="auth-divider"><span>eller</span></div>

    <button class="sso-btn" onclick="alert('SSO-inloggning via organisation')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8h6M8 5v6"/></svg>
      Logga in med organisations-SSO
    </button>

    <div class="version-foot">M2M Coach v2.1.0 · Säker anslutning</div>
  </div>
</div>

<script>
let pwVisible = false;
let remembered = false;

function togglePw() {
  pwVisible = !pwVisible;
  const input = document.getElementById('password');
  input.type = pwVisible ? 'text' : 'password';
  document.getElementById('eyeIcon').innerHTML = pwVisible
    ? '<path d="M1 8s2.7-5 7-5 7 5 7 5-2.7 5-7 5-7-5-7-5z"/><line x1="2" y1="14" x2="14" y2="2"/>'
    : '<path d="M1 8s2.7-5 7-5 7 5 7 5-2.7 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/>';
}

function toggleRemember() {
  remembered = !remembered;
  document.getElementById('rememberCheck').classList.toggle('checked', remembered);
}

function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const error = document.getElementById('authError');
  error.classList.remove('show');

  btn.innerHTML = '<div class="loading-spinner"></div>';
  btn.disabled = true;

  setTimeout(() => {
    const email = document.getElementById('email').value;
    if (email.includes('m2m') || email.includes('coach') || email.includes('test')) {
      window.location.href = 'dashboard.html';
    } else {
      btn.innerHTML = '<svg viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h3M11 12l4-4-4-4M15 8H7"/></svg> Logga in';
      btn.disabled = false;
      error.classList.add('show');
    }
  }, 1400);
}
</script>
</body>
</html>
